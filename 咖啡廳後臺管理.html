<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>店家後台管理 - 校園快閃咖啡館</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #fdfbf7;
            margin: 0;
            padding: 20px;
            color: #3d3d3d;
        }
        header {
            background-color: #6f4e37;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(111, 78, 55, 0.15);
        }
        header strong { font-size: 1.2rem; letter-spacing: 1px; }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        .btn-server-entry {
            background: rgba(255, 255, 255, 0.12);
            border: 1px dashed #f5ebe0;
            color: #f5ebe0;
            padding: 6px 14px;
            font-family: "Microsoft JhengHei", sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }
        .btn-server-entry:hover {
            background: #f5ebe0;
            color: #6f4e37;
            box-shadow: 0 0 12px rgba(245,235,224,0.4);
        }
        .refresh-tag {
            font-size: 0.8rem;
            background: rgba(255,255,255,0.18);
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: 500;
        }
        .section-title {
            font-size: 1.15rem;
            color: #6f4e37;
            margin: 25px 0 15px 0;
            border-left: 4px solid #e76f51;
            padding-left: 10px;
            font-weight: bold;
        }
        .order-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .order-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid #6f4e37;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #f3ebe1;
        }
        .order-header {
            padding: 12px 15px;
            background: #fdfbf7;
            border-bottom: 1px solid #f3ebe1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-body { padding: 15px; flex-grow: 1; }
        .item-list-container { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
            font-size: 0.95rem;
        }
        .item-details { display: flex; flex-direction: column; }
        .item-spec { color: #d35400; font-size: 0.8rem; margin-top: 3px; font-weight: 500; }
        .item-qty-display { font-weight: bold; color: #6f4e37; background: #fdfbf7; padding: 2px 8px; border-radius: 4px; border: 1px solid #f3ebe1; }
        .total-price { text-align: right; margin-top: 15px; font-weight: bold; color: #e76f51; font-size: 1.2rem; }
        .status-footer { padding: 15px; background: #fdfbf7; border-top: 1px solid #f3ebe1; }
        .btn { border: none; padding: 12px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-status-control { width: 100%; text-align: center; font-size: 1rem; }
        .btn-edit { background-color: #2980b9; padding: 4px 8px; font-size: 0.8rem; margin-right: 5px; }
        .btn-danger { background-color: #ff4d4d; padding: 4px 8px; font-size: 0.8rem; }
        .btn-modal-action { background-color: #6f4e37; border: 1px solid #6f4e37; color: white; padding: 8px 16px; border-radius: 6px; }
        .btn-modal-reset { background-color: #c0392b; border: 1px solid #c0392b; color: white; padding: 8px 16px; border-radius: 6px; }
        .btn-modal-close { background-color: #95a5a6; color: white; padding: 8px 16px; border-radius: 6px; }
        .member-table-container { background: white; border-radius: 12px; border: 1px solid #f3ebe1; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow-x: auto; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #f3ebe1; }
        th { background-color: #fdfbf7; color: #6f4e37; font-weight: bold; }
        tr:hover { background-color: #fffdfa; }
        .backend-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(61, 53, 47, 0.6); backdrop-filter: blur(4px); z-index: 9999;
            justify-content: center; align-items: center; padding: 20px;
        }
        .server-room {
            width: 100%; max-width: 800px; background: white; color: #3d3d3d; padding: 30px;
            box-shadow: 0 10px 35px rgba(111, 78, 55, 0.25); border-radius: 16px; border: 3px solid #6f4e37;
            max-height: 90vh; overflow-y: auto;
        }
        .status-indicator { border-bottom: 2px solid #f3ebe1; padding-bottom: 15px; margin-bottom: 20px; }
        .status-indicator h2 { margin: 0 0 5px 0; color: #6f4e37; font-size: 1.4rem; }
        .bi-metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .bi-metric-card { background: #fdfbf7; border: 1px solid #f3ebe1; padding: 15px; border-radius: 8px; text-align: center; }
        .bi-metric-card h5 { margin: 0 0 6px 0; color: #777; font-size: 0.9rem; }
        .bi-metric-card .bi-value { font-size: 1.4rem; font-weight: bold; color: #e76f51; }
        .rank-list { list-style: none; padding: 0; margin: 0 0 25px 0; }
        .rank-item {
            display: flex; justify-content: space-between; padding: 10px 15px; background: #fdfbf7;
            margin-bottom: 6px; border-radius: 6px; font-size: 0.95rem; border: 1px solid #f3ebe1; border-left: 4px solid #e76f51;
        }
        .btn-panel { display: flex; gap: 10px; border-top: 1px solid #f3ebe1; padding-top: 15px; align-items: center; }
    </style>
</head>
<body>

    <header>
        <div><strong>🛠 店家後台管理看板</strong> | 快閃咖啡館</div>
        <div class="header-controls">
            <button class="btn-server-entry" onclick="toggleBackendServer(true)"> 數據資料 </button>
            <div class="refresh-tag">● 即時動態連線中</div>
        </div>
    </header>

    <div class="section-title">即時顧客點餐明細</div>
    <div class="order-grid" id="admin-order-list"></div>

    <div class="section-title">會員帳號資料維護版面</div>
    <div class="member-table-container">
        <table>
            <thead>
                <tr>
                    <th>會員姓名</th>
                    <th>聯絡電話 (帳號)</th>
                    <th>消費紀錄 (次數)</th>
                    <th>累積點數 (50元計1點)</th>
                    <th>管理操作</th>
                </tr>
            </thead>
            <tbody id="admin-member-list"></tbody>
        </table>
    </div>

    <div class="backend-overlay" id="backend-system-modal">
        <div class="server-room">
            <div class="status-indicator">
                <h2>📊 營收數據分析控制台</h2>
            </div>
            
            <div class="bi-metrics-grid">
                <div class="bi-metric-card">
                    <h5>今日總營業額</h5>
                    <div class="bi-value" id="bi-revenue">NT$ 0</div>
                </div>
                <div class="bi-metric-card">
                    <h5>今日總訂單數</h5>
                    <div class="bi-value" id="bi-order-count">0 筆</div>
                </div>
                <div class="bi-metric-card">
                    <h5>待製作 / 待出貨</h5>
                    <div class="bi-value" id="bi-pending-count" style="color: #f39c12;">0 筆</div>
                </div>
                <div class="bi-metric-card">
                    <h5>平均客單價 (ATV)</h5>
                    <div class="bi-value" id="bi-atv" style="color: #27ae60;">NT$ 0</div>
                </div>
            </div>

            <div style="font-weight: bold; color: #6f4e37; margin-bottom: 8px; font-size: 0.95rem;">🔥 當日熱銷單品排行榜 (Top Sales Items)</div>
            <div class="rank-list" id="bi-ranking-list"></div>

            <div class="btn-panel">
                <button class="btn btn-modal-reset" onclick="settleAndResetData()">⚠️ 結算並完全重置營收大數據</button>
                <button class="btn btn-modal-action" onclick="triggerAggregation()">刷新數據</button>
                <button class="btn btn-modal-close" onclick="toggleBackendServer(false)" style="margin-left: auto;">關閉 [X]</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'coffee_orders_team130';
        const HISTORY_KEY = 'coffee_history_team130'; 
        const MEMBER_KEY = 'coffee_members_team130';

        // 縮短為 1 秒（1000ms），達到前後台即時雙向更新的效果
        setInterval(() => {
            renderOrders();
            renderMembers();
            triggerAggregation(); 
        }, 1000);

        // 1. 渲染即時訂單列表 (合併單一智慧按鍵)
        function renderOrders() {
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const container = document.getElementById('admin-order-list');
            
            if (orders.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#999; padding:40px; background:white; border-radius:12px; border:1px solid #f3ebe1;">目前尚無待處理點單</div>';
                return;
            }

            container.innerHTML = orders.map(order => {
                let btnText = "開始製作";
                let btnBg = "#f39c12"; // 橘黃色
                let currentStatusDisplay = order.status || '待處理';

                if (order.status === "製作中") {
                    btnText = "通知取餐";
                    btnBg = "#d35400"; // 深橘色
                } else if (order.status === "請取餐") {
                    btnText = "已完成訂單";
                    btnBg = "#27ae60"; // 綠色
                }

                return `
                    <div class="order-card">
                        <div>
                            <div class="order-header">
                                <span style="font-weight:bold; font-size:1.15rem; color:#6f4e37;">#${order.id}</span>
                                <span style="font-size:0.85rem; color:#888;">${order.time}</span>
                            </div>
                            <div class="order-body">
                                <div style="margin-bottom:6px;">👤 客戶名稱: <strong>${order.name || '未綁定'}</strong></div>
                                <div style="font-size:0.85rem; color:#666; margin-bottom:10px;">📞 聯絡電話: ${order.phone || '未提供'}</div>
                                <div style="font-size:0.9rem; color:#e76f51; margin-bottom:10px;">📌 當前進度: <strong>${currentStatusDisplay}</strong></div>
                                
                                <div class="item-list-container">
                                    ${order.items.map(i => `
                                        <div class="item-row">
                                            <div class="item-details">
                                                <strong>${i.name}</strong>
                                                <span class="item-spec"> 規格: ${i.customString || '固定規格'}</span>
                                            </div>
                                            <span class="item-qty-display">x${i.quantity}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                        <div>
                            <div style="padding: 0 15px;"><div class="total-price">總計金額: NT$ ${order.total}</div></div>
                            <div class="status-footer">
                                <button class="btn btn-status-control" style="background-color: ${btnBg};" onclick="handleOrderStep(${order.id})">${btnText}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 單一按鍵核心控制邏輯
        // 修正後台核心控制邏輯：確保第三階段結算封存時，點數不會遺失
function handleOrderStep(orderId) {
    let orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const index = orders.findIndex(o => o.id === orderId);
    
    if (index === -1) return;

    let currentStatus = orders[index].status || '待處理';

    if (currentStatus === "待處理") {
        orders[index].status = "製作中";
        localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
        renderOrders();
    } else if (currentStatus === "製作中") {
        orders[index].status = "請取餐";
        localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
        renderOrders();
    } else if (currentStatus === "請取餐") {
        // 🎯 第三階段點擊：這就是你說的「完成訂單/從畫面刪除」
        if (confirm(`確認單號 #${orderId} 顧客已完成取餐，要封存並刪除此卡片嗎？`)) {
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            let finishedOrder = orders[index];
            
            // 🔥【核心修正】打包送進歷史紀錄時，必須完整保留前台傳來的點數與小計欄位
            let cleanOrderForHistory = {
                id: finishedOrder.id,
                name: finishedOrder.name,
                phone: finishedOrder.phone,
                items: finishedOrder.items,
                subtotal: finishedOrder.subtotal || finishedOrder.total || 0, // 保留原始小計以利後續計算
                discountUsed: finishedOrder.discountUsed || 0,
                pointsDeducted: finishedOrder.pointsDeducted || 0,           // 關鍵：將扣除點數永久寫入歷史紀錄
                total: finishedOrder.total,
                time: finishedOrder.time,
                status: 'completed' // 標記為已完結
            };
            
            history.push(cleanOrderForHistory);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            
            // 從進行中佇列（畫面上）刪除
            orders = orders.filter(o => o.id !== orderId);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
            
            // 刷新後台所有版面
            renderOrders();
            renderMembers();
            triggerAggregation();
        }
    }
}

        // 2. 渲染會員控制面板
        function renderMembers() {
    const members = JSON.parse(localStorage.getItem(MEMBER_KEY) || '[]');
    const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    const activeOrders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const tbody = document.getElementById('admin-member-list');

    if (members.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#999;">目前尚無註冊會員資料</td></tr>';
        return;
    }

    const allOrders = [...history, ...activeOrders];

    tbody.innerHTML = members.map(member => {
        // 過濾該會員的所有訂單
        const memberOrders = allOrders.filter(o => String(o.phone).trim() === String(member.phone).trim());
        const orderCount = memberOrders.length;
        
        // 🔥【後台核心修正】點數計算邏輯與前台完全同步
        // 1. 計算賺取的點數 (用 subtotal 原始總額算)
        const totalEarnedSpent = memberOrders.reduce((sum, o) => sum + Number(o.subtotal || o.total || 0), 0);
        const totalPointsEarned = Math.floor(totalEarnedSpent / 50);
        
        // 2. 減去已經兌換扣除的點數
        const totalPointsDeducted = memberOrders.reduce((sum, o) => sum + Number(o.pointsDeducted || 0), 0);
        
        // 3. 得到目前實際剩餘點數
        let currentPoints = totalPointsEarned - totalPointsDeducted;
        if (currentPoints < 0) currentPoints = 0;

        return `
            <tr>
                <td><strong>${member.name}</strong></td>
                <td>${member.phone}</td>
                <td>${orderCount} 次</td>
                <td style="color:#e76f51; font-weight:bold;">${currentPoints} 點</td>
                <td>
                    <button class="btn btn-edit" onclick="editMemberDetails('${member.phone}', '${member.name}')">✏️ 修改資料</button>
                    <button class="btn btn-danger" onclick="deleteMember('${member.phone}')">🗑 刪除會員檔案</button>
                </td>
            </tr>
        `;
    }).join('');
}

        function editMemberDetails(oldPhone, currentName) {
            const newName = prompt(`【步驟 1/2】請輸入會員新的姓名：`, currentName);
            if (newName === null) return; 
            
            const newPhone = prompt(`【步驟 2/2】請輸入會員新的電話號碼：`, oldPhone);
            if (newPhone === null) return; 

            const finalName = newName.trim();
            const finalPhone = newPhone.trim();

            if (finalName !== "" && finalPhone !== "") {
                let members = JSON.parse(localStorage.getItem(MEMBER_KEY) || '[]');
                if (oldPhone !== finalPhone && members.some(m => m.phone === finalPhone)) {
                    alert(`❌ 修改失敗：電話號碼 「${finalPhone}」 已被其他註冊會員使用！`);
                    return;
                }

                const memberIndex = members.findIndex(m => m.phone === oldPhone);
                if (memberIndex !== -1) {
                    members[memberIndex].name = finalName;
                    members[memberIndex].phone = finalPhone;
                    localStorage.setItem(MEMBER_KEY, JSON.stringify(members));
                    
                    let activeOrders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    activeOrders.forEach(o => {
                        if (o.phone === oldPhone) { o.name = finalName; o.phone = finalPhone; }
                    });
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(activeOrders));

                    alert(`🎉 會員資料修改成功！`);
                    renderMembers(); renderOrders(); triggerAggregation();
                }
            }
        }

        function deleteMember(phone) {
            if (confirm(`確定要完全刪除此會員帳號 (${phone}) 的檔案嗎？`)) {
                let members = JSON.parse(localStorage.getItem(MEMBER_KEY) || '[]');
                members = members.filter(m => m.phone !== phone);
                localStorage.setItem(MEMBER_KEY, JSON.stringify(members));
                renderMembers(); triggerAggregation();
            }
        }

        function triggerAggregation() {
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const allOrders = [...orders, ...history];

            const grandTotal = allOrders.reduce((sum, o) => sum + Number(o.total || 0), 0);
            const totalOrdersCount = allOrders.length;
            const pendingCount = orders.length;
            const atv = totalOrdersCount > 0 ? Math.round(grandTotal / totalOrdersCount) : 0;

            document.getElementById('bi-revenue').innerText = `NT$ ${grandTotal}`;
            document.getElementById('bi-order-count').innerText = `${totalOrdersCount} 筆`;
            document.getElementById('bi-pending-count').innerText = `${pendingCount} 筆`;
            document.getElementById('bi-atv').innerText = `NT$ ${atv}`;

            const itemMap = {};
            allOrders.forEach(o => {
                if (o.items && Array.isArray(o.items)) {
                    o.items.forEach(i => { itemMap[i.name] = (itemMap[i.name] || 0) + Number(i.quantity || 1); });
                }
            });

            const sortedItems = Object.keys(itemMap).map(name => {
                return { name: name, qty: itemMap[name] };
            }).sort((a, b) => b.qty - a.qty);

            const rankContainer = document.getElementById('bi-ranking-list');
            if (sortedItems.length === 0) {
                rankContainer.innerHTML = '<p style="font-size:0.85rem; color:#999; margin:0;">目前尚無商品銷售排行數據</p>';
            } else {
                rankContainer.innerHTML = sortedItems.slice(0, 3).map((item, index) => `
                    <div class="rank-item">
                        <span><strong>No.${index + 1}</strong> — ${item.name}</span>
                        <span style="font-weight:bold; color:#e76f51;">已售出 ${item.qty} 份</span>
                    </div>
                `).join('');
            }
        }

        function settleAndResetData() {
            if (confirm(`確定要結算並清空「所有即時訂單」與「歷史銷售紀錄」嗎？\n(會員名單將安全保留)`)) {
                if (confirm(`⚠️ 警告：這將會完全重置數據，確定繼續？`)) {
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.removeItem(HISTORY_KEY);
                    alert(`結算完成！`);
                    renderOrders(); renderMembers(); triggerAggregation(); toggleBackendServer(false); 
                }
            }
        }

        function toggleBackendServer(show) {
            const modal = document.getElementById('backend-system-modal');
            modal.style.display = show ? 'flex' : 'none';
            if (show) triggerAggregation(); 
        }

        window.onload = function() { renderOrders(); renderMembers(); triggerAggregation(); };
    </script>
</body>
</html>
